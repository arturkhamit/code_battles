<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Code Battle Arena</title>
        <style>
            body {
                font-family: "Segoe UI", Tahoma, sans-serif;
                background-color: #1e1e2e;
                color: #cdd6f4;
                margin: 0;
                padding: 20px;
                display: flex;
                flex-direction: column;
                height: 100vh;
                box-sizing: border-box;
            }
            h1 {
                text-align: center;
                color: #89b4fa;
                margin-top: 0;
                margin-bottom: 5px;
            }
            .timer-display {
                text-align: center;
                font-size: 28px;
                font-weight: bold;
                color: #f38ba8;
                font-family: monospace;
                margin-bottom: 15px;
            }

            .header-controls {
                display: flex;
                gap: 15px;
                align-items: center;
                margin-bottom: 15px;
                background: #181825;
                padding: 15px;
                border-radius: 8px;
                flex-wrap: wrap;
            }
            input[type="number"],
            input[type="text"],
            select {
                background-color: #11111b;
                border: 1px solid #45475a;
                color: #cdd6f4;
                padding: 8px;
                border-radius: 5px;
                outline: none;
                transition:
                    border-color 0.2s,
                    background-color 0.2s;
            }
            button {
                background-color: #89b4fa;
                color: #11111b;
                border: none;
                padding: 10px 15px;
                border-radius: 5px;
                cursor: pointer;
                font-weight: bold;
                transition: 0.2s;
            }
            button:hover {
                background-color: #b4befe;
            }
            button:disabled {
                background-color: #45475a;
                color: #a6adc8;
                cursor: not-allowed;
            }
            .btn-danger {
                background-color: #f38ba8;
            }
            .btn-success {
                background-color: #a6e3a1;
            }
            /* Стили для новой кнопки Start Battle */
            .btn-warning {
                background-color: #f9e2af;
                color: #11111b;
            }
            .btn-warning:hover {
                background-color: #f5c2e7;
            }
            /* Класс для скрытия элементов */
            .hidden {
                display: none !important;
            }

            /* --- НОВЫЕ СТИЛИ ДЛЯ ОШИБОК --- */
            .error-banner {
                background-color: rgba(243, 139, 168, 0.15);
                color: #f38ba8;
                border: 1px solid #f38ba8;
                padding: 12px 15px;
                border-radius: 8px;
                margin-bottom: 15px;
                font-size: 14px;
                display: none;
                line-height: 1.5;
            }
            .is-invalid {
                border-color: #f38ba8 !important;
                background-color: rgba(243, 139, 168, 0.1) !important;
            }
            /* ------------------------------ */

            .panel-container {
                display: flex;
                gap: 15px;
                flex: 1;
                min-height: 0;
            }
            .panel {
                background-color: #313244;
                padding: 15px;
                border-radius: 10px;
                display: flex;
                flex-direction: column;
                box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
                overflow-y: auto;
            }
            .task-panel {
                flex: 1;
            }
            .code-panel {
                flex: 1.2;
            }
            .log-panel {
                flex: 0.8;
            }

            .task-title {
                color: #f9e2af;
                margin-top: 0;
            }
            .test-case {
                background-color: #11111b;
                padding: 10px;
                border-radius: 5px;
                margin-bottom: 10px;
                border-left: 3px solid #89b4fa;
            }
            .test-case pre {
                margin: 5px 0 0 0;
                font-family: monospace;
                color: #a6e3a1;
                white-space: pre-wrap;
            }

            .code-form {
                display: flex;
                flex-direction: column;
                flex: 1;
                gap: 10px;
            }
            .form-toolbar {
                display: flex;
                justify-content: space-between;
                align-items: center;
            }

            .btn-submit {
                background-color: #a6e3a1;
                font-size: 16px;
                padding: 12px;
            }
            .btn-submit:hover {
                background-color: #94e2d5;
            }

            .status-banner {
                padding: 10px;
                border-radius: 5px;
                background-color: #181825;
                text-align: center;
                font-weight: bold;
                border: 1px solid #45475a;
                margin-bottom: 10px;
            }
            .status-ok {
                background-color: rgba(166, 227, 161, 0.2);
                color: #a6e3a1;
                border-color: #a6e3a1;
            }
            .status-err {
                background-color: rgba(243, 139, 168, 0.2);
                color: #f38ba8;
                border-color: #f38ba8;
            }
            .status-wait {
                background-color: rgba(249, 226, 175, 0.2);
                color: #f9e2af;
                border-color: #f9e2af;
            }

            textarea {
                width: 100%;
                flex: 1;
                background-color: #11111b;
                color: #a6e3a1;
                border: 1px solid #45475a;
                border-radius: 5px;
                padding: 15px;
                font-family: "Courier New", Courier, monospace;
                font-size: 14px;
                resize: none;
                box-sizing: border-box;
                outline: none;
            }
            textarea:focus {
                border-color: #89b4fa;
            }

            #logs {
                font-family: monospace;
                font-size: 13px;
                overflow-y: auto;
                background-color: #11111b;
                padding: 10px;
                border-radius: 5px;
                flex: 1;
                white-space: pre-wrap;
                color: #bac2de;
            }
            .log-sys {
                color: #f9e2af;
            }
            .log-err {
                color: #f38ba8;
            }
            .log-ok {
                color: #a6e3a1;
            }
        </style>
    </head>
    <body>
        <h1>Code Battle Arena</h1>
        <div class="timer-display" id="timerDisplay">00:00</div>

        <div class="header-controls">
            <label>Task ID:</label>
            <input type="number" id="taskId" value="1" style="width: 50px" />

            <label>User ID:</label>
            <input type="number" id="userId" value="1" style="width: 50px" />

            <label>Type:</label>
            <select id="battleType">
                <option value="1v1">1v1</option>
                <option value="group">Group</option>
            </select>

            <label>Duration (min):</label>
            <input type="number" id="duration" value="15" style="width: 50px" />

            <div
                style="
                    width: 2px;
                    height: 30px;
                    background: #45475a;
                    margin: 0 10px;
                "
            ></div>

            <button id="createBtn" onclick="createBattle()" class="btn-success">
                Create Battle
            </button>

            <div
                style="
                    width: 2px;
                    height: 30px;
                    background: #45475a;
                    margin: 0 10px;
                "
            ></div>

            <label>Battle ID:</label>
            <input
                type="number"
                id="battleId"
                placeholder="ID"
                style="width: 60px"
            />
            <button id="joinBtn" onclick="joinBattle()">Join Battle</button>

            <div
                style="
                    width: 2px;
                    height: 30px;
                    background: #45475a;
                    margin: 0 10px;
                "
            ></div>

            <button
                id="startBattleBtn"
                onclick="requestStartBattle()"
                class="btn-warning hidden"
            >
                ▶ Start Battle!
            </button>

            <button
                id="disconnectBtn"
                onclick="disconnect()"
                class="btn-danger"
                style="margin-left: auto"
                disabled
            >
                Disconnect
            </button>
        </div>

        <div id="errorBanner" class="error-banner"></div>

        <div class="panel-container">
            <div class="panel task-panel">
                <h2 id="taskTitle" class="task-title">
                    Waiting for a connection...
                </h2>
                <div id="taskDescription" style="margin-bottom: 20px">
                    Connect to a battle to see a task
                </div>
                <div
                    id="taskLimits"
                    style="font-size: 12px; color: #bac2de; margin-bottom: 15px"
                ></div>
                <div id="publicTests"></div>
            </div>

            <div class="panel code-panel">
                <div id="lastSubmitStatus" class="status-banner">
                    Status: no submissions
                </div>

                <form id="codeForm" class="code-form">
                    <div class="form-toolbar">
                        <div>
                            <select id="languageSelect">
                                <option value="python">Python 3</option>
                                <option value="cpp">C++</option>
                            </select>
                        </div>
                        <div>
                            <button
                                type="button"
                                onclick="loadBadCode()"
                                style="padding: 5px 10px; font-size: 12px"
                            >
                                Bad code
                            </button>
                            <button
                                type="button"
                                onclick="loadGoodCode()"
                                style="padding: 5px 10px; font-size: 12px"
                            >
                                Good code
                            </button>
                        </div>
                    </div>

                    <textarea
                        id="codeEditor"
                        placeholder="# Your code..."
                        required
                        disabled
                    ></textarea>
                    <button
                        type="submit"
                        id="submitBtn"
                        class="btn-submit"
                        disabled
                    >
                        Send code
                    </button>
                </form>
            </div>

            <div class="panel log-panel">
                <h3 style="margin-top: 0">Broadcasting</h3>
                <div id="logs">
                    <span class="log-sys">System is ready...</span>
                </div>
            </div>
        </div>

        <script>
            let ws = null;
            let currentPlayersCount = 0;

            const logsDiv = document.getElementById("logs");
            const createBtn = document.getElementById("createBtn");
            const joinBtn = document.getElementById("joinBtn");
            const disconnectBtn = document.getElementById("disconnectBtn");
            const startBattleBtn = document.getElementById("startBattleBtn");
            const submitBtn = document.getElementById("submitBtn");
            const codeForm = document.getElementById("codeForm");
            const codeEditor = document.getElementById("codeEditor");
            const statusBanner = document.getElementById("lastSubmitStatus");
            const timerDisplay = document.getElementById("timerDisplay");
            const errorBanner = document.getElementById("errorBanner");

            let frontendTimerInterval = null;

            function log(msg, type = "") {
                const time = new Date().toLocaleTimeString();
                const span = document.createElement("div");
                if (type) span.className = type;
                span.textContent = `[${time}] ${msg}`;
                logsDiv.appendChild(span);
                logsDiv.scrollTop = logsDiv.scrollHeight;
            }

            // --- ФУНКЦИИ ХЕНДЛИНГА ОШИБОК ---
            function clearErrors() {
                errorBanner.style.display = "none";
                errorBanner.innerHTML = "";
                document.querySelectorAll(".is-invalid").forEach((el) => {
                    el.classList.remove("is-invalid");
                });
            }

            function showErrors(errorData) {
                errorBanner.style.display = "block";
                let messages = [];

                // Словарь (маппинг) названий полей DRF на ID инпутов в HTML
                const fieldToInputMap = {
                    task: "taskId",
                    creator: "userId",
                    type: "battleType",
                    duration: "duration",
                    battle_id: "battleId",
                    user_id: "userId",
                };

                for (const [key, msgList] of Object.entries(errorData)) {
                    const errText = Array.isArray(msgList)
                        ? msgList.join(", ")
                        : msgList;

                    if (key === "non_field_errors" || key === "detail") {
                        messages.push(
                            `<strong>Global Error:</strong> ${errText}`,
                        );
                    } else {
                        messages.push(`<strong>${key}</strong>: ${errText}`);
                        // Если есть инпут для этого поля - подсвечиваем его красным
                        const inputId = fieldToInputMap[key];
                        if (inputId) {
                            const inputEl = document.getElementById(inputId);
                            if (inputEl) inputEl.classList.add("is-invalid");
                        }
                    }
                }
                errorBanner.innerHTML = messages.join("<br>");
            }
            // --------------------------------

            function startFrontendTimer(deadlineUnix) {
                clearInterval(frontendTimerInterval);

                function update() {
                    const now = Math.floor(Date.now() / 1000);
                    const remaining = Math.max(0, deadlineUnix - now);

                    let m = Math.floor(remaining / 60)
                        .toString()
                        .padStart(2, "0");
                    let s = (remaining % 60).toString().padStart(2, "0");
                    timerDisplay.innerText = `${m}:${s}`;

                    if (remaining <= 0) clearInterval(frontendTimerInterval);
                }

                update();
                frontendTimerInterval = setInterval(update, 1000);
            }

            async function createBattle() {
                clearErrors(); // Очищаем старые ошибки

                const userId = parseInt(
                    document.getElementById("userId").value,
                );
                const taskId = document.getElementById("taskId").value; // убрал parseInt для возможности ссылок
                const type = document.getElementById("battleType").value;
                const duration = parseInt(
                    document.getElementById("duration").value,
                );

                log("Requesting Django to create a new battle...", "log-sys");
                createBtn.disabled = true;

                // Если нужно отправлять именно ссылку по задаче из твоего бэкенда:
                // В твоем DRF сериализаторе "task" - это URL.
                let taskUrl = `https://www.taskId.com/${taskId}`;
                if (taskId && taskId.toString().startsWith("http")) {
                    taskUrl = taskId; // Если юзер уже ввел ссылку
                }

                const payload = {
                    task: taskUrl,
                    creator: userId,
                    type: type,
                    ranked: false,
                    duration: duration,
                };

                try {
                    const response = await fetch(
                        "http://localhost:8000/api/internal/battles/create/",
                        {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify(payload),
                        },
                    );

                    // ОБРАБОТКА ОШИБОК HTTP/DRF
                    if (!response.ok) {
                        createBtn.disabled = false;
                        if (response.status === 500) {
                            showErrors({
                                "Server Error":
                                    "Internal Server Error (500). Please try again.",
                            });
                            log("Server returned 500", "log-err");
                            return;
                        }

                        try {
                            const errorData = await response.json();
                            showErrors(errorData); // Парсим ответ DRF
                            log(
                                "Validation error on battle creation",
                                "log-err",
                            );
                        } catch (e) {
                            // Фолбэк, если сервер вернул не JSON
                            const errorText = await response.text();
                            showErrors({
                                Server: `Returned ${response.status}: ${errorText}`,
                            });
                            log(
                                `Server returned ${response.status}`,
                                "log-err",
                            );
                        }
                        return;
                    }

                    const data = await response.json();
                    const realBattleId = data.id || data.battle_id;

                    log(
                        `Battle successfully created! ID: ${realBattleId}`,
                        "log-ok",
                    );
                    document.getElementById("battleId").value = realBattleId;

                    connectToWebsocket(realBattleId, userId, taskId);
                } catch (error) {
                    log(`Failed to create battle: ${error.message}`, "log-err");
                    showErrors({
                        Network: "Failed to connect to the API server.",
                    });
                    createBtn.disabled = false;
                }
            }

            function joinBattle() {
                clearErrors(); // Очищаем ошибки перед джоином

                const battleId = document.getElementById("battleId").value;
                const userId = document.getElementById("userId").value;
                const taskId = document.getElementById("taskId").value;

                // Базовая валидация перед коннектом
                let errors = {};
                if (!battleId)
                    errors["battle_id"] = "Please enter a Battle ID to join.";
                if (!userId) errors["user_id"] = "Please enter your User ID.";

                if (Object.keys(errors).length > 0) {
                    showErrors(errors);
                    return;
                }

                connectToWebsocket(battleId, userId, taskId);
            }

            async function fetchTaskInfo(taskId) {
                try {
                    const response = await fetch(
                        `http://localhost:8001/api/tasks/${taskId}/info`,
                    );

                    if (response.ok) {
                        const data = await response.json();
                        document.getElementById("taskTitle").innerText =
                            data.name;
                        document.getElementById("taskDescription").innerText =
                            data.description;
                        document.getElementById("taskLimits").innerText =
                            `Time limit: ${data.time_limit || "Not specified"} sec.`;

                        let testsHtml = "<h3>Examples:</h3>";
                        const inputs = data.public_tests.input || [];
                        const outputs = data.public_tests.output || [];

                        if (inputs.length === 0)
                            testsHtml += "<div>No public tests</div>";

                        for (let i = 0; i < inputs.length; i++) {
                            testsHtml += `
                                <div class="test-case">
                                    <div><strong>Input:</strong><pre>${inputs[i]}</pre></div>
                                    <div style="margin-top:10px;"><strong>Expected Output:</strong><pre>${outputs[i]}</pre></div>
                                </div>`;
                        }

                        document.getElementById("publicTests").innerHTML =
                            testsHtml;
                    } else {
                        document.getElementById("taskTitle").innerText =
                            "Error loading task";
                    }
                } catch (e) {
                    console.error("Error fetching task:", e);
                    log("Failed to load task data", "log-err");
                }
            }

            function setStatus(text, stateClass) {
                statusBanner.innerText = text;
                statusBanner.className = `status-banner ${stateClass}`;
            }

            function requestStartBattle() {
                if (!ws || ws.readyState !== WebSocket.OPEN) return;

                log("Requesting server to start the battle...", "log-sys");
                ws.send(JSON.stringify({ action: "start_battle_request" }));
            }

            function connectToWebsocket(battleId, userId, taskId) {
                const wsUrl = `ws://localhost:8001/ws/battle/${battleId}/${userId}`;

                log("Connecting to WebSocket...", "log-sys");
                ws = new WebSocket(wsUrl);

                ws.onopen = () => {
                    log("Connected! Waiting in lobby...", "log-ok");
                    timerDisplay.innerText = "LOBBY";
                    createBtn.disabled = true;
                    joinBtn.disabled = true;
                    disconnectBtn.disabled = false;

                    codeEditor.disabled = true;
                    submitBtn.disabled = true;

                    fetchTaskInfo(taskId);
                };

                ws.onmessage = (event) => {
                    const data = JSON.parse(event.data);

                    if (data.event === "lobby_update") {
                        currentPlayersCount = data.data.participants_count;
                        const type =
                            document.getElementById("battleType").value;

                        if (type === "1v1" && currentPlayersCount >= 2) {
                            startBattleBtn.classList.remove("hidden");
                            log(
                                "Lobby is full! You can start the battle.",
                                "log-ok",
                            );
                        } else {
                            startBattleBtn.classList.add("hidden");
                        }
                    } else if (data.event === "battle_started") {
                        log("Battle STARTED! Good luck!", "log-ok");

                        startBattleBtn.classList.add("hidden");
                        codeEditor.disabled = false;
                        submitBtn.disabled = false;

                        startFrontendTimer(data.data.deadline);
                    } else if (data.event === "battle_finished") {
                        clearInterval(frontendTimerInterval);

                        if (data.data.reason === "time_up") {
                            log("Time is up! No winner.", "log-err");
                            setStatus("TIME IS UP! NO WINNER.", "status-err");
                        } else {
                            log(
                                `BATTLE FINISHED! Winner: User ${data.data.winner_id}`,
                                "log-ok",
                            );
                            setStatus("BATTLE FINISHED!", "status-ok");
                        }

                        submitBtn.disabled = true;
                        codeEditor.disabled = true;
                        setTimeout(() => disconnect(), 2000);
                    } else if (data.event === "execution_result") {
                        if (data.data.is_correct) {
                            setStatus(
                                "ACCEPTED (All test cases are passed)",
                                "status-ok",
                            );
                            log("All test cases passed!", "log-ok");
                        } else {
                            setStatus(
                                `WRONG ANSWER (${data.data.message})`,
                                "status-err",
                            );
                            log(
                                `TESTS FAILED:\n${data.data.message}`,
                                "log-err",
                            );
                        }
                    } else if (data.event === "opponent_running_code") {
                        log(
                            `Opponent (User ${data.data.user_id}) is running code...`,
                            "log-sys",
                        );
                    } else if (data.event === "user_joined") {
                        log(
                            `Opponent (User ${data.data.user_id}) joined!`,
                            "log-sys",
                        );
                    } else if (data.event === "user_left") {
                        log(
                            `Opponent (User ${data.data.user_id}) left.`,
                            "log-err",
                        );
                        currentPlayersCount = Math.max(
                            0,
                            currentPlayersCount - 1,
                        );
                        if (currentPlayersCount < 2) {
                            startBattleBtn.classList.add("hidden");
                        }
                    }
                };

                ws.onclose = () => {
                    log("Connection closed.", "log-err");
                    createBtn.disabled = false;
                    joinBtn.disabled = false;
                    disconnectBtn.disabled = true;
                    submitBtn.disabled = true;
                    codeEditor.disabled = true;
                    startBattleBtn.classList.add("hidden");
                    ws = null;
                };
            }

            function disconnect() {
                if (ws) ws.close();
            }

            codeForm.addEventListener("submit", function (event) {
                event.preventDefault();

                if (!ws || ws.readyState !== WebSocket.OPEN) {
                    alert("Please connect first!");
                    return;
                }

                const code = codeEditor.value;
                const lang = document.getElementById("languageSelect").value;
                const taskId =
                    parseInt(document.getElementById("taskId").value) || 1;

                ws.send(
                    JSON.stringify({
                        action: "submit_code",
                        language: lang,
                        code: code,
                        task_id: taskId,
                    }),
                );

                log("Code submitted...", "log-sys");
                setStatus("Code is running...", "status-wait");
            });

            function loadBadCode() {
                codeEditor.value = "print('no')";
            }

            function loadGoodCode() {
                codeEditor.value = "print('yes')";
            }
        </script>
    </body>
</html>
